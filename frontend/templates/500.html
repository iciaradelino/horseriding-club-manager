{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>500 · Server error · Herradura</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body style="display:grid;place-items:center;min-height:100vh">
    <div style="text-align:center;max-width:520px;padding:2rem">
        <div style="font-family:var(--font-display);font-size:8rem;line-height:1;color:var(--color-danger);letter-spacing:-.04em" class="tabular">500</div>
        <h1 style="font-size:2rem;margin-top:1rem">Something threw a shoe</h1>
        <p class="muted mt-4">We've hit a snag on our end. The team has been notified — please try again in a moment.</p>
        <a href="/" class="btn btn-primary mt-6">Back to the dashboard</a>
    </div>
</body>
</html>
